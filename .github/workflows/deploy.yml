name: Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-push-model:
    name: Build & Push Model Container
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories \
            --repository-names colleague-voice-bot-model \
            --region us-east-1 || \
          aws ecr create-repository \
            --repository-name colleague-voice-bot-model \
            --region us-east-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: docker build -t colleague-voice-bot-model model/

      - name: Tag and push to ECR
        run: |
          docker tag colleague-voice-bot-model:latest ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/colleague-voice-bot-model:latest
          docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/colleague-voice-bot-model:latest

  deploy-cdk:
    name: Deploy CDK Stacks
    runs-on: ubuntu-latest
    needs: build-and-push-model
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build --workspace=frontend

      - name: Deploy CDK stacks
        run: npm run deploy:ci --workspace=infra

  seed-quotes:
    name: Seed Quote Library
    runs-on: ubuntu-latest
    needs: deploy-cdk
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Install dependencies
        run: npm ci

      - name: Run seed script
        run: npx ts-node backend/scripts/seed-quotes.ts
        env:
          QUOTE_LIBRARY_TABLE: QuoteLibrary
          AWS_REGION: us-east-1

  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: seed-quotes
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Install dependencies
        run: npm ci

      - name: Run smoke tests
        run: npm run test:smoke
        env:
          CLOUDFRONT_URL: ${{ vars.CLOUDFRONT_URL }}
          AUDIO_BUCKET_NAME: ${{ vars.AUDIO_BUCKET_NAME }}
          VOICE_PROFILES_TABLE: ${{ vars.VOICE_PROFILES_TABLE }}
          QUOTE_LIBRARY_TABLE: ${{ vars.QUOTE_LIBRARY_TABLE }}
          SAGEMAKER_ENDPOINT_NAME: ${{ vars.SAGEMAKER_ENDPOINT_NAME }}
          AWS_REGION: us-east-1
