name: Deploy

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  ECR_REPO: colleague-voice-bot-model

jobs:
  # ── Phase 1: Base infrastructure (no Docker image needed) ─────────────────
  deploy-infra-base:
    name: 1 · Deploy Storage + Auth
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - run: npm ci

      - name: Build frontend (needed for CDK synth of CdnStack)
        run: npm run build --workspace=frontend

      - name: Ensure ECR repository exists
        # Create the ECR repo before CDK deploy so the SageMaker stack can
        # import it by name. Safe to run on every deploy — idempotent.
        run: |
          aws ecr describe-repositories \
            --repository-names $ECR_REPO \
            --region $AWS_REGION 2>/dev/null || \
          aws ecr create-repository \
            --repository-name $ECR_REPO \
            --image-scanning-configuration scanOnPush=true \
            --region $AWS_REGION

      - name: Deploy Storage + Auth stacks
        run: npx cdk deploy ColleagueVoiceBotStorage ColleagueVoiceBotAuth --require-approval never
        working-directory: infra
        env:
          MODEL_IMAGE_URI: placeholder

  # ── Phase 2: Build + push Docker image ────────────────────────────────────
  build-and-push-model:
    name: 2 · Build & Push Model Image
    runs-on: ubuntu-latest
    needs: deploy-infra-base
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: docker build -t $ECR_REPO model/

      - name: Push to ECR
        run: |
          IMAGE_URI=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPO:latest
          docker tag $ECR_REPO:latest $IMAGE_URI
          docker push $IMAGE_URI

      - name: Verify image exists in ECR
        run: |
          IMAGE_URI=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPO:latest
          echo "Verifying image: $IMAGE_URI"
          aws ecr describe-images \
            --repository-name $ECR_REPO \
            --image-ids imageTag=latest \
            --region $AWS_REGION
          echo "✅ Image confirmed in ECR"

  # ── Phase 3: Deploy SageMaker stack (image now confirmed in ECR) ──────────
  deploy-sagemaker:
    name: 3 · Deploy SageMaker Stack
    runs-on: ubuntu-latest
    needs: build-and-push-model
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - run: npm ci

      - name: Build frontend (needed for CDK synth)
        run: npm run build --workspace=frontend

      - name: Deploy SageMaker stack
        run: npx cdk deploy ColleagueVoiceBotSageMaker --require-approval never
        working-directory: infra
        env:
          MODEL_IMAGE_URI: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/${{ env.ECR_REPO }}:latest

  # ── Phase 4: Deploy API + CDN stacks ──────────────────────────────────────
  deploy-api-cdn:
    name: 4 · Deploy API + CDN
    runs-on: ubuntu-latest
    needs: deploy-sagemaker
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - run: npm ci

      - name: Build frontend
        run: npm run build --workspace=frontend

      - name: Deploy API + CDN stacks
        run: npx cdk deploy ColleagueVoiceBotApi ColleagueVoiceBotCdn --require-approval never
        working-directory: infra
        env:
          MODEL_IMAGE_URI: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/${{ env.ECR_REPO }}:latest

  # ── Phase 5: Seed quote library ───────────────────────────────────────────
  seed-quotes:
    name: 5 · Seed Quote Library
    runs-on: ubuntu-latest
    needs: deploy-api-cdn
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - run: npm ci

      - name: Run seed script
        run: npx ts-node backend/scripts/seed-quotes.ts
        env:
          QUOTE_LIBRARY_TABLE: QuoteLibrary
          AWS_REGION: us-east-1

  # ── Phase 6: Smoke tests ──────────────────────────────────────────────────
  smoke-tests:
    name: 6 · Smoke Tests
    runs-on: ubuntu-latest
    needs: seed-quotes
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - run: npm ci

      - name: Run smoke tests
        run: npm run test:smoke
        env:
          CLOUDFRONT_URL: ${{ vars.CLOUDFRONT_URL }}
          AUDIO_BUCKET_NAME: ${{ vars.AUDIO_BUCKET_NAME }}
          VOICE_PROFILES_TABLE: ${{ vars.VOICE_PROFILES_TABLE }}
          QUOTE_LIBRARY_TABLE: ${{ vars.QUOTE_LIBRARY_TABLE }}
          SAGEMAKER_ENDPOINT_NAME: ${{ vars.SAGEMAKER_ENDPOINT_NAME }}
          AWS_REGION: us-east-1
